<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JSON Template Replacer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand fw-bold fs-5"><i class="bi bi-braces me-2"></i>JSON Template Replacer</span>
</nav>

<div class="container-fluid py-4 px-4">
  <div class="row g-4">

    <!-- LEFT COLUMN -->
    <div class="col-lg-5">

      <!-- Import JSON -->
      <div class="card shadow-sm mb-4 card-top-row">
        <div class="card-header fw-semibold"><i class="bi bi-upload me-2"></i>Import JSON File</div>
        <div class="card-body">
          <input type="file" id="fileInput" accept=".json" class="form-control mb-3"/>
          <label class="form-label text-muted small">Original JSON Preview</label>
          <pre id="originalPreview" class="json-preview bg-light p-3 rounded border text-muted fst-italic">No file loaded yet.</pre>
        </div>
      </div>

      <!-- Placeholder Config -->
      <div class="card shadow-sm">
        <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
          <span><i class="bi bi-sliders me-2"></i>Placeholder Configuration</span>
          <button class="btn btn-sm btn-outline-primary" id="addRowBtn"><i class="bi bi-plus-lg me-1"></i>Add Row</button>
        </div>
        <div class="card-body p-0">
          <table class="table table-bordered mb-0" id="placeholderTable">
            <thead class="table-light">
              <tr>
                <th style="width:40px" class="text-center"></th>
                <th style="width:40px" class="text-center"><input type="checkbox" class="form-check-input" id="checkAll" checked/></th>
                <th>Actual Value (to replace)</th>
                <th>Placeholder Token (replace with)</th>
                <th style="width:40px"></th>
              </tr>
            </thead>
            <tbody id="placeholderBody">
              <!-- Predefined rows injected by JS -->
            </tbody>
          </table>
        </div>
        <div class="card-footer text-end">
          <button class="btn btn-primary" id="applyBtn"><i class="bi bi-play-fill me-1"></i>Apply Replacements</button>
        </div>
      </div>

    </div>

    <!-- RIGHT COLUMN -->
    <div class="col-lg-7">

      <!-- Output / Modified JSON -->
      <div class="card shadow-sm mb-4 card-top-row">
        <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
          <span><i class="bi bi-file-earmark-code me-2"></i>Modified JSON Output</span>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-secondary" id="copyBtn" disabled><i class="bi bi-clipboard me-1"></i>Copy</button>
            <button class="btn btn-sm btn-success" id="exportBtn" disabled><i class="bi bi-download me-1"></i>Export</button>
          </div>
        </div>
        <div class="card-body">
          <pre id="outputPreview" class="json-preview bg-light p-3 rounded border text-muted fst-italic">Apply replacements to see output.</pre>
        </div>
      </div>

      <!-- Diff View -->
      <div class="card shadow-sm" id="diffCard">
        <div class="card-header fw-semibold"><i class="bi bi-file-diff me-2"></i>Diff View</div>
        <div class="card-body p-0">
          <div id="diffContainer" class="diff-container p-0">
            <div class="text-muted fst-italic p-3 small">Diff will appear here after applying replacements.</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="toast" class="toast align-items-center text-bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body"><i class="bi bi-check-circle me-2"></i><span id="toastMsg">Copied to clipboard!</span></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
